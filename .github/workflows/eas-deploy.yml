name: EAS Deploy

on:
  release:
    types: [published]

concurrency:
  group: eas-deploy
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm vitest run

  build-ios:
    name: Build iOS + Submit
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API key
        run: |
          mkdir -p keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" > keys/ApiKey_YSUNUUHQV8PO.p8

      - name: Build and submit iOS
        run: eas build --platform ios --profile production --auto-submit --non-interactive
        env:
          EAS_ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          EAS_ASC_API_KEY_PATH: keys/ApiKey_YSUNUUHQV8PO.p8
          EAS_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EAS_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EAS_APPLE_TEAM_TYPE: ${{ secrets.APPLE_TEAM_TYPE }}

  build-android:
    name: Build Android
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        run: eas build --platform android --profile production --non-interactive --clear-cache
