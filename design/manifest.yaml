# Phase 1: DISCOVER
goal: "Mobile research app for holocron knowledge base with remote research workflows"
vibe: "elegant, minimal"
references:
  - url: "https://reactnativereusables.com/"
    notes: "shadcn/ui port for React Native - use existing styling patterns"

# Phase 2: TARGET
